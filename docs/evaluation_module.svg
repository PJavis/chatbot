<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Evaluation Module</title>
  <desc id="desc">Very small diagram showing evaluation inputs, metric calculation, and evaluation report outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="metric" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff0c7"/>
      <stop offset="100%" stop-color="#fffaf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1d2b3a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#335166"/>
    </marker>
    <style>
      .title { font: 800 28px Georgia, "Times New Roman", serif; fill: #20313f; }
      .subtitle { font: 500 14px "Avenir Next", "Trebuchet MS", sans-serif; fill: #526879; }
      .label { font: 800 16px "Avenir Next", "Trebuchet MS", sans-serif; fill: #253746; }
      .small { font: 500 13px "Avenir Next", "Trebuchet MS", sans-serif; fill: #536879; }
      .tiny { font: 500 12px "Avenir Next", "Trebuchet MS", sans-serif; fill: #637687; }
      .box { stroke: #b8c7d2; stroke-width: 1.5; rx: 22; filter: url(#shadow); }
      .arrow { stroke: #335166; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #6b7f8f; stroke-width: 1.9; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="980" height="420" fill="url(#bg)"/>
  <circle cx="88" cy="80" r="60" fill="#d5ecff" opacity=".48"/>
  <circle cx="870" cy="340" r="72" fill="#ffe7ad" opacity=".4"/>

  <text x="48" y="58" class="title">Evaluation Module</text>
  <text x="48" y="84" class="subtitle">Đánh giá chất lượng câu trả lời của chatbot bằng các metric hỏi đáp.</text>

  <!-- Inputs -->
  <rect x="70" y="150" width="210" height="112" class="box" fill="#ffffff"/>
  <text x="175" y="192" text-anchor="middle" class="label">Inputs</text>
  <text x="175" y="221" text-anchor="middle" class="small">Examples + Ground Truth</text>
  <text x="175" y="244" text-anchor="middle" class="small">Predicted Answers</text>

  <!-- Metrics -->
  <rect x="386" y="130" width="240" height="152" class="box" fill="url(#metric)"/>
  <text x="506" y="178" text-anchor="middle" class="label">Metric Calculator</text>
  <text x="506" y="209" text-anchor="middle" class="small">Exact Match</text>
  <text x="506" y="232" text-anchor="middle" class="small">Token F1</text>
  <text x="506" y="255" text-anchor="middle" class="small">BLEU / Recall</text>

  <!-- Output -->
  <rect x="730" y="150" width="200" height="112" class="box" fill="#ffffff"/>
  <text x="830" y="192" text-anchor="middle" class="label">Report</text>
  <text x="830" y="221" text-anchor="middle" class="small">Scores summary</text>
  <text x="830" y="244" text-anchor="middle" class="small">Model quality view</text>

  <!-- Optional live Rasa -->
  <rect x="386" y="326" width="240" height="56" class="box" fill="#f4fbff"/>
  <text x="506" y="360" text-anchor="middle" class="small">Optional: generate predictions from live Rasa</text>

  <!-- Arrows -->
  <path d="M 280 206 C 318 206, 346 206, 379 206" class="arrow"/>
  <path d="M 626 206 C 666 206, 695 206, 723 206" class="arrow"/>
  <path d="M 506 326 C 506 306, 506 294, 506 287" class="soft"/>
</svg>
