<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="1120" viewBox="0 0 1720 1120" role="img" aria-labelledby="title desc">
  <title id="title">Rasa Backend Overview</title>
  <desc id="desc">Detailed overview diagram of the Rasa backend, including REST channel, command generator, policies, flows, enterprise search, actions, tracker state, and trained assistant package.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbf6"/>
      <stop offset="50%" stop-color="#edf8ff"/>
      <stop offset="100%" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1">
      <stop offset="0%" stop-color="#e3f7df"/>
      <stop offset="100%" stop-color="#f6fff2"/>
    </linearGradient>
    <linearGradient id="search" x1="0" x2="1">
      <stop offset="0%" stop-color="#dff1ff"/>
      <stop offset="100%" stop-color="#f4fbff"/>
    </linearGradient>
    <linearGradient id="runtime" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff0c7"/>
      <stop offset="100%" stop-color="#fffaf0"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d2b3a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#314f63"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7f8f"/>
    </marker>
    <style>
      .title { font: 800 34px Georgia, "Times New Roman", serif; fill: #20313f; }
      .subtitle { font: 500 16px "Avenir Next", "Trebuchet MS", sans-serif; fill: #526879; }
      .section { font: 800 18px "Avenir Next", "Trebuchet MS", sans-serif; fill: #263a49; letter-spacing: .2px; }
      .label { font: 700 16px "Avenir Next", "Trebuchet MS", sans-serif; fill: #253746; }
      .small { font: 500 13px "Avenir Next", "Trebuchet MS", sans-serif; fill: #536879; }
      .tiny { font: 500 12px "Avenir Next", "Trebuchet MS", sans-serif; fill: #637687; }
      .code { font: 700 12px "Avenir Next", "Trebuchet MS", sans-serif; fill: #335166; }
      .box { stroke: #b8c7d2; stroke-width: 1.6; rx: 24; filter: url(#shadow); }
      .chip { fill: #ffffff; stroke: #c9d6df; stroke-width: 1; rx: 12; }
      .divider { stroke: #d8e2e8; stroke-width: 1.2; }
      .arrow { stroke: #314f63; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #6b7f8f; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1720" height="1120" fill="url(#bg)"/>
  <circle cx="120" cy="130" r="88" fill="#dff5d8" opacity=".48"/>
  <circle cx="1540" cy="130" r="96" fill="#d5ecff" opacity=".48"/>
  <circle cx="1495" cy="970" r="130" fill="#ffe4a8" opacity=".38"/>

  <text x="72" y="70" class="title">Rasa Backend Overview</text>
  <text x="72" y="101" class="subtitle">Chi tiết backend: REST webhook, pipeline LLM, policies, flows, enterprise search và gói assistant đã huấn luyện</text>

  <!-- External caller -->
  <rect x="80" y="184" width="245" height="130" rx="24" fill="#ffffff" stroke="#b8c7d2" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="202" y="232" text-anchor="middle" class="label">Client gọi backend</text>
  <text x="202" y="262" text-anchor="middle" class="small">Gradio UI / Evaluation</text>
  <text x="202" y="288" text-anchor="middle" class="tiny">POST message + sender</text>

  <!-- REST channel -->
  <rect x="425" y="170" width="285" height="160" class="box" fill="#ffffff"/>
  <text x="568" y="216" text-anchor="middle" class="section">REST Channel</text>
  <text x="568" y="245" text-anchor="middle" class="small">REST configuration</text>
  <line x1="462" y1="268" x2="674" y2="268" class="divider"/>
  <text x="568" y="297" text-anchor="middle" class="code">/webhooks/rest/webhook</text>
  <text x="568" y="318" text-anchor="middle" class="tiny">Rasa server port 5005</text>

  <!-- Command generator -->
  <rect x="830" y="145" width="330" height="210" class="box" fill="url(#core)"/>
  <text x="995" y="192" text-anchor="middle" class="section">Command Generator</text>
  <text x="995" y="221" text-anchor="middle" class="small">SearchReadyLLMCommandGenerator</text>
  <line x1="870" y1="247" x2="1120" y2="247" class="divider"/>
  <text x="995" y="278" text-anchor="middle" class="tiny">Dùng command prompt</text>
  <text x="995" y="300" text-anchor="middle" class="code">LLM-assisted routing</text>
  <text x="995" y="327" text-anchor="middle" class="tiny">Sinh command và chọn flow phù hợp</text>

  <!-- Tracker state -->
  <rect x="1285" y="170" width="300" height="160" class="box" fill="#ffffff"/>
  <text x="1435" y="216" text-anchor="middle" class="section">Tracker State</text>
  <text x="1435" y="247" text-anchor="middle" class="small">Quản lý ngữ cảnh hội thoại</text>
  <text x="1435" y="273" text-anchor="middle" class="tiny">sender, events, slots</text>
  <text x="1435" y="300" text-anchor="middle" class="tiny">Default: in-memory tracker</text>

  <!-- Policy engine -->
  <rect x="575" y="460" width="455" height="270" class="box" fill="url(#core)"/>
  <text x="802" y="507" text-anchor="middle" class="section">Policy Engine</text>
  <text x="802" y="535" text-anchor="middle" class="small">Điều phối hành động tiếp theo</text>
  <line x1="620" y1="562" x2="985" y2="562" class="divider"/>
  <rect x="625" y="590" width="175" height="48" class="chip"/>
  <text x="712" y="620" text-anchor="middle" class="small">FlowPolicy</text>
  <rect x="820" y="590" width="165" height="48" class="chip"/>
  <text x="902" y="620" text-anchor="middle" class="small">RulePolicy</text>
  <rect x="625" y="660" width="360" height="48" class="chip"/>
  <text x="805" y="690" text-anchor="middle" class="small">EnterpriseSearchPolicy</text>
  <text x="802" y="718" text-anchor="middle" class="tiny">check_relevancy: true</text>

  <!-- Flows/domain -->
  <rect x="1085" y="485" width="300" height="220" class="box" fill="#ffffff"/>
  <text x="1235" y="531" text-anchor="middle" class="section">Flows + Domain</text>
  <text x="1235" y="560" text-anchor="middle" class="small">Conversation definitions</text>
  <text x="1235" y="584" text-anchor="middle" class="small">Domain responses and slots</text>
  <line x1="1125" y1="610" x2="1345" y2="610" class="divider"/>
  <text x="1235" y="639" text-anchor="middle" class="tiny">greet, ask_help, thanks</text>
  <text x="1235" y="662" text-anchor="middle" class="tiny">goodbye, chitchat</text>
  <text x="1235" y="685" text-anchor="middle" class="tiny">pattern_search → action_trigger_search</text>

  <!-- Search subsystem -->
  <rect x="1085" y="790" width="455" height="220" class="box" fill="url(#search)"/>
  <text x="1312" y="837" text-anchor="middle" class="section">Enterprise Search</text>
  <text x="1312" y="866" text-anchor="middle" class="small">Truy xuất và sinh câu trả lời từ tri thức</text>
  <line x1="1130" y1="892" x2="1495" y2="892" class="divider"/>
  <rect x="1135" y="920" width="175" height="46" class="chip"/>
  <text x="1222" y="949" text-anchor="middle" class="small">FAISS Vector Store</text>
  <rect x="1330" y="920" width="165" height="46" class="chip"/>
  <text x="1412" y="949" text-anchor="middle" class="small">Knowledge docs</text>
  <text x="1312" y="992" text-anchor="middle" class="tiny">Search prompt keeps answers grounded</text>

  <!-- Actions -->
  <rect x="1455" y="485" width="185" height="220" class="box" fill="#ffffff"/>
  <text x="1548" y="531" text-anchor="middle" class="section">Actions</text>
  <text x="1548" y="563" text-anchor="middle" class="small">Custom action layer</text>
  <line x1="1486" y1="588" x2="1610" y2="588" class="divider"/>
  <text x="1548" y="618" text-anchor="middle" class="tiny">action_endpoint</text>
  <text x="1548" y="641" text-anchor="middle" class="tiny">invoked when a flow</text>
  <text x="1548" y="664" text-anchor="middle" class="tiny">needs custom logic</text>

  <!-- Model artifact -->
  <rect x="80" y="465" width="335" height="190" class="box" fill="#fffdf8"/>
  <text x="248" y="511" text-anchor="middle" class="section">Model Artifact</text>
  <text x="248" y="540" text-anchor="middle" class="small">Trained assistant package</text>
  <line x1="122" y1="566" x2="374" y2="566" class="divider"/>
  <text x="248" y="596" text-anchor="middle" class="tiny">Đóng gói pipeline và policies</text>
  <text x="248" y="620" text-anchor="middle" class="tiny">Được nạp khi backend phục vụ request</text>

  <!-- Main request path -->
  <path d="M 325 249 C 360 249, 385 249, 418 249" class="arrow"/>
  <text x="372" y="231" text-anchor="middle" class="code">HTTP</text>

  <path d="M 710 250 C 752 250, 785 250, 823 250" class="arrow"/>
  <text x="766" y="232" text-anchor="middle" class="code">message</text>

  <path d="M 1160 250 C 1200 250, 1238 250, 1278 250" class="arrowSoft"/>
  <text x="1220" y="232" text-anchor="middle" class="tiny">state lookup/update</text>

  <path d="M 995 355 C 972 405, 920 438, 860 458" class="arrow"/>
  <text x="925" y="420" text-anchor="middle" class="code">commands</text>

  <path d="M 1030 595 C 1050 595, 1065 595, 1078 595" class="arrow"/>
  <text x="1055" y="578" text-anchor="middle" class="tiny">uses</text>

  <path d="M 1010 705 C 1070 760, 1130 812, 1190 838" class="arrow"/>
  <text x="1090" y="778" text-anchor="middle" class="code">knowledge query</text>

  <path d="M 1385 596 C 1408 596, 1428 596, 1448 596" class="arrowSoft"/>
  <text x="1418" y="579" text-anchor="middle" class="tiny">custom action</text>

  <!-- Dependency paths -->
  <path d="M 340 655 C 430 705, 525 715, 575 685" class="arrowSoft"/>
  <text x="455" y="724" text-anchor="middle" class="tiny">trained behaviour</text>

  <path d="M 1030 685 C 1085 725, 1130 780, 1178 850" class="arrowSoft"/>
  <text x="1095" y="755" text-anchor="middle" class="tiny">retrieval context</text>

  <!-- Response path -->
  <path d="M 575 462 C 465 390, 410 340, 425 282" class="arrowSoft"/>
  <text x="482" y="377" text-anchor="middle" class="tiny">assistant response</text>

  <!-- Scope note -->
  <rect x="1275" y="1035" width="365" height="55" rx="18" fill="#fffdf8" stroke="#d8cba8" stroke-width="1.3"/>
  <text x="1458" y="1069" text-anchor="middle" class="tiny">Runtime-focused diagram: không mô tả chi tiết xử lý dữ liệu.</text>
</svg>
