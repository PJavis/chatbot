<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="1080" viewBox="0 0 1720 1080" role="img" aria-labelledby="title desc">
  <title id="title">Chatbot System Overview</title>
  <desc id="desc">Overview diagram of the Vietnamese chatbot system, including Gradio UI, shared Rasa API client, Rasa backend, conversation policies, knowledge search, evaluation module, and Docker deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="48%" stop-color="#eef7f1"/>
      <stop offset="100%" stop-color="#fff8ed"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#d9f0ff"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </linearGradient>
    <linearGradient id="rasaGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#e6f7df"/>
      <stop offset="100%" stop-color="#f5fff1"/>
    </linearGradient>
    <linearGradient id="evalGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff0c7"/>
      <stop offset="100%" stop-color="#fff9e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d2b3a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#335166"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7f8f"/>
    </marker>
    <style>
      .title { font: 800 34px Georgia, "Times New Roman", serif; fill: #20313f; }
      .subtitle { font: 500 16px "Avenir Next", "Trebuchet MS", sans-serif; fill: #526879; }
      .section { font: 800 18px "Avenir Next", "Trebuchet MS", sans-serif; fill: #263a49; letter-spacing: .2px; }
      .label { font: 700 16px "Avenir Next", "Trebuchet MS", sans-serif; fill: #253746; }
      .small { font: 500 13px "Avenir Next", "Trebuchet MS", sans-serif; fill: #536879; }
      .tiny { font: 500 12px "Avenir Next", "Trebuchet MS", sans-serif; fill: #637687; }
      .port { font: 800 12px "Avenir Next", "Trebuchet MS", sans-serif; fill: #335166; }
      .box { stroke: #b8c7d2; stroke-width: 1.6; rx: 22; filter: url(#shadow); }
      .inner { stroke: #c9d6df; stroke-width: 1.2; rx: 16; }
      .arrow { stroke: #335166; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #6b7f8f; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); stroke-dasharray: 7 7; }
      .divider { stroke: #d8e2e8; stroke-width: 1.2; }
      .chip { fill: #ffffff; stroke: #c9d6df; stroke-width: 1; rx: 12; }
    </style>
  </defs>

  <rect width="1720" height="1080" fill="url(#bg)"/>
  <circle cx="115" cy="110" r="86" fill="#d4ecff" opacity=".45"/>
  <circle cx="1530" cy="930" r="135" fill="#ffe8ab" opacity=".42"/>
  <circle cx="1430" cy="120" r="84" fill="#dff5d8" opacity=".52"/>

  <text x="72" y="70" class="title">Tổng quan hệ thống chatbot</text>
  <text x="72" y="100" class="subtitle">Kiến trúc vận hành: giao diện Gradio, Rasa backend, tìm kiếm tri thức, đánh giá và triển khai Docker</text>

  <!-- User -->
  <rect x="80" y="190" width="220" height="120" rx="24" fill="#ffffff" stroke="#b8c7d2" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="190" y="236" text-anchor="middle" class="label">Người dùng</text>
  <text x="190" y="263" text-anchor="middle" class="small">Đặt câu hỏi tiếng Việt</text>
  <text x="190" y="286" text-anchor="middle" class="small">và xem phản hồi</text>

  <!-- UI -->
  <rect x="420" y="145" width="380" height="260" class="box" fill="url(#uiGrad)"/>
  <text x="610" y="187" text-anchor="middle" class="section">Gradio UI</text>
  <text x="610" y="212" text-anchor="middle" class="tiny">Service `ui` - cổng 7860</text>
  <line x1="458" y1="234" x2="762" y2="234" class="divider"/>
  <rect x="458" y="258" width="142" height="44" class="chip"/>
  <text x="529" y="286" text-anchor="middle" class="small">Chat với Rasa</text>
  <rect x="620" y="258" width="142" height="44" class="chip"/>
  <text x="691" y="286" text-anchor="middle" class="small">Dataset Explorer</text>
  <rect x="458" y="322" width="142" height="44" class="chip"/>
  <text x="529" y="350" text-anchor="middle" class="small">Tạo Predictions</text>
  <rect x="620" y="322" width="142" height="44" class="chip"/>
  <text x="691" y="350" text-anchor="middle" class="small">Chạy Evaluation</text>
  <text x="610" y="389" text-anchor="middle" class="tiny">Forward message tới RASA_REST_URL và stream câu trả lời</text>

  <!-- Shared API client -->
  <rect x="915" y="205" width="275" height="150" rx="22" fill="#ffffff" stroke="#b8c7d2" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="1052" y="249" text-anchor="middle" class="label">Rasa API Client</text>
  <text x="1052" y="276" text-anchor="middle" class="small">`rasa_inference.py`</text>
  <text x="1052" y="303" text-anchor="middle" class="tiny">call_rasa, format_response,</text>
  <text x="1052" y="323" text-anchor="middle" class="tiny">make_sender, batch predictions</text>

  <!-- Rasa backend -->
  <rect x="1320" y="128" width="310" height="310" class="box" fill="url(#rasaGrad)"/>
  <text x="1475" y="170" text-anchor="middle" class="section">Rasa Backend</text>
  <text x="1475" y="195" text-anchor="middle" class="tiny">Service `rasa` - cổng 5005</text>
  <line x1="1360" y1="218" x2="1590" y2="218" class="divider"/>
  <rect x="1360" y="241" width="230" height="46" class="chip"/>
  <text x="1475" y="270" text-anchor="middle" class="small">REST Webhook</text>
  <rect x="1360" y="307" width="230" height="46" class="chip"/>
  <text x="1475" y="336" text-anchor="middle" class="small">FlowPolicy + RulePolicy</text>
  <rect x="1360" y="373" width="230" height="46" class="chip"/>
  <text x="1475" y="402" text-anchor="middle" class="small">EnterpriseSearchPolicy</text>
  <text x="1475" y="426" text-anchor="middle" class="tiny">Quản lý hội thoại và chọn phản hồi phù hợp</text>

  <!-- Conversation flows -->
  <rect x="1235" y="560" width="300" height="190" rx="24" fill="#ffffff" stroke="#b8c7d2" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="1385" y="604" text-anchor="middle" class="label">Luồng hội thoại</text>
  <text x="1385" y="635" text-anchor="middle" class="small">greet / help / thanks</text>
  <text x="1385" y="661" text-anchor="middle" class="small">goodbye / chitchat</text>
  <text x="1385" y="687" text-anchor="middle" class="small">ask_knowledge</text>
  <text x="1385" y="724" text-anchor="middle" class="tiny">Phản hồi mẫu và điều phối</text>

  <!-- Knowledge search -->
  <rect x="815" y="585" width="315" height="215" class="box" fill="#f3fbef"/>
  <text x="972" y="630" text-anchor="middle" class="label">Knowledge Search</text>
  <text x="972" y="659" text-anchor="middle" class="small">Trả lời câu hỏi factual</text>
  <text x="972" y="684" text-anchor="middle" class="small">dựa trên kho tri thức</text>
  <line x1="858" y1="711" x2="1086" y2="711" class="divider"/>
  <text x="972" y="741" text-anchor="middle" class="tiny">FAISS vector store</text>
  <text x="972" y="765" text-anchor="middle" class="tiny">Nguồn runtime: `rasa_app/docs`</text>
  <text x="972" y="789" text-anchor="middle" class="tiny">Không dùng kiến thức ngoài corpus</text>

  <!-- LLM embeddings -->
  <rect x="440" y="615" width="275" height="160" rx="24" fill="#ffffff" stroke="#b8c7d2" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="577" y="659" text-anchor="middle" class="label">LLM + Embeddings</text>
  <text x="577" y="690" text-anchor="middle" class="small">OpenRouter Gemma</text>
  <text x="577" y="716" text-anchor="middle" class="small">OpenRouter embeddings</text>
  <text x="577" y="752" text-anchor="middle" class="tiny">Hiểu truy vấn và hỗ trợ tìm kiếm</text>

  <!-- Evaluation -->
  <rect x="90" y="610" width="265" height="200" class="box" fill="url(#evalGrad)"/>
  <text x="222" y="655" text-anchor="middle" class="label">Evaluation Module</text>
  <text x="222" y="685" text-anchor="middle" class="small">`evaluation/`</text>
  <line x1="125" y1="710" x2="320" y2="710" class="divider"/>
  <text x="222" y="741" text-anchor="middle" class="small">Exact Match</text>
  <text x="222" y="767" text-anchor="middle" class="small">Token F1</text>
  <text x="222" y="793" text-anchor="middle" class="small">BLEU / Recall@k</text>

  <!-- Deployment -->
  <rect x="435" y="910" width="750" height="105" rx="24" fill="#ffffff" stroke="#b8c7d2" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="810" y="952" text-anchor="middle" class="label">Triển khai</text>
  <text x="810" y="982" text-anchor="middle" class="small">Local commands qua `main.py` hoặc Docker Compose</text>
  <text x="810" y="1008" text-anchor="middle" class="tiny">`ui:7860` phụ thuộc `rasa:5005`, cấu hình qua biến môi trường RASA_REST_URL</text>

  <!-- Main arrows -->
  <path d="M 300 250 C 342 250, 370 250, 413 250" class="arrow"/>
  <text x="356" y="232" text-anchor="middle" class="port">message</text>

  <path d="M 800 280 C 842 280, 870 280, 908 280" class="arrow"/>
  <text x="854" y="262" text-anchor="middle" class="port">REST</text>

  <path d="M 1190 280 C 1230 280, 1270 280, 1313 280" class="arrow"/>
  <text x="1252" y="262" text-anchor="middle" class="port">webhook</text>

  <path d="M 1475 438 C 1475 488, 1438 525, 1408 558" class="arrow"/>
  <path d="M 1365 438 C 1265 505, 1185 560, 1130 630" class="arrow"/>
  <path d="M 815 695 C 780 695, 755 695, 720 695" class="arrowSoft"/>
  <path d="M 1045 355 C 1030 430, 1005 505, 988 578" class="arrowSoft"/>

  <!-- Evaluation arrows -->
  <path d="M 458 405 C 360 475, 280 535, 235 603" class="arrowSoft"/>
  <path d="M 355 710 C 385 710, 405 710, 433 710" class="arrowSoft"/>
  <text x="394" y="693" text-anchor="middle" class="tiny">batch questions</text>

  <!-- Return response -->
  <path d="M 1320 160 C 1110 58, 805 58, 650 142" class="arrowSoft"/>
  <text x="990" y="86" text-anchor="middle" class="tiny">assistant response</text>

  <!-- Deployment relation -->
  <path d="M 660 910 C 640 800, 622 600, 615 405" class="arrowSoft"/>
  <path d="M 1000 910 C 1175 780, 1365 580, 1445 438" class="arrowSoft"/>

  <!-- Notes -->
  <rect x="1285" y="885" width="330" height="120" rx="22" fill="#fffdf8" stroke="#d8cba8" stroke-width="1.4"/>
  <text x="1450" y="925" text-anchor="middle" class="label">Ghi chú phạm vi</text>
  <text x="1450" y="958" text-anchor="middle" class="small">Sơ đồ tập trung vào runtime</text>
  <text x="1450" y="984" text-anchor="middle" class="small">và không mô tả xử lý dữ liệu.</text>
</svg>
