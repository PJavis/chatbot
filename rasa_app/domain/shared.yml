version: "3.1"

slots:
  return_value:
    type: any
    mappings:
      - type: controlled

intents:
  - greet
  - ask_help
  - thanks
  - goodbye

responses:
  utter_greet:
    - text: "Hello! I can help you manage your contacts or answer general questions."
  utter_help_overview:
    - text: "I can add, list, or remove contacts. Ask me to add someone by handle, or say 'list my contacts.'"
  utter_appreciation:
    - text: "You're welcome! Let me know if you need anything else."
  utter_goodbye:
    - text: "Goodbye! Reach out again if you need more help."
  utter_free_chitchat_response:
    - text: "I'm here to help."
      metadata:
        rephrase: True
        rephrase_prompt: |
          You are a friendly assistant that replies to casual conversation.
          Write a short, natural, and context-aware response to the user's latest message.
          Keep it conversational and avoid sounding robotic.
          Use the conversation context and the latest user message to shape the reply.

          Conversation history:
          {{history}}

          Latest user message:
          {{current_input}}

          Suggested response:
          {{suggested_response}}

          Rewritten response:
