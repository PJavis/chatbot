services:
  rasa:
    build:
      context: ./rasa_app
      dockerfile: Dockerfile
    image: chatbot-rasa
    ports:
      - "5005:5005"
    env_file:
      - ./rasa_app/.env
    environment:
      - RASA_DATA_SOURCE=/data/processed
      - RASA_KB_DIR=/app/docs
    restart: unless-stopped
    volumes:
      - ./rasa_app/models:/app/models
      - ./rasa_app:/app
      - ./data:/data:ro

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    image: chatbot-ui
    ports:
      - "7860:7860"
    env_file:
      - ./rasa_app/.env
    restart: unless-stopped
    depends_on:
      - rasa
    environment:
      - RASA_REST_URL=http://rasa:5005/webhooks/rest/webhook
      - RASA_CHAT_SENDER=gradio_user
      - RASA_API_TIMEOUT=75
      - ENABLE_TAVILY_FALLBACK=${ENABLE_TAVILY_FALLBACK:-1}
      - TAVILY_MAX_RESULTS=${TAVILY_MAX_RESULTS:-3}
      - TAVILY_SEARCH_DEPTH=${TAVILY_SEARCH_DEPTH:-basic}
      - TAVILY_INCLUDE_ANSWER=${TAVILY_INCLUDE_ANSWER:-advanced}
      - TAVILY_TIMEOUT=${TAVILY_TIMEOUT:-20}
      - UI_PORT=7860
      - RASA_DATA_SOURCE=/data/processed
      - RASA_KB_DIR=/app/docs
    volumes:
      - .:/app:ro
      - ./data:/app/data:ro
