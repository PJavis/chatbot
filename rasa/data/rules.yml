version: "3.1"

rules:

- rule: Say hello
  steps:
    - intent: greet
    - action: utter_greet

- rule: Say goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Handle out of scope
  steps:
    - intent: out_of_scope
    - action: utter_out_of_scope

- rule: Handle information query with RAG
  steps:
    - intent: ask_information
    - action: utter_searching
    - action: action_rag_search

- rule: Handle technical query with RAG
  steps:
    - intent: ask_technical
    - action: utter_searching
    - action: action_rag_search

- rule: Handle FAQ with RAG
  steps:
    - intent: ask_faq
    - action: utter_searching
    - action: action_rag_search

- rule: Human handoff
  steps:
    - intent: ask_human_handoff
    - action: action_human_handoff
